<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화해하가 하브루타</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#F5EFE0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.setup{max-width:380px;width:90%;background:#fff;border-radius:12px;border:1px solid #C9A96E;padding:2rem;text-align:center;box-shadow:0 4px 20px rgba(139,26,26,0.1)}
.setup-deco{font-size:20px;color:#C9A96E;letter-spacing:10px;margin-bottom:1rem}
.setup-title{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:600;color:#8B1A1A;line-height:1.7;margin-bottom:0.3rem}
.setup-sub{font-size:12px;color:#999;margin-bottom:0.8rem}
.divider{width:40px;height:2px;background:#8B1A1A;margin:0.8rem auto 1.2rem}
.setup input{width:100%;padding:10px 14px;border:1px solid #C9A96E;border-radius:8px;font-size:14px;font-family:'Noto Sans KR',sans-serif;margin-bottom:10px;outline:none;background:#FDFAF4;color:#333;display:block}
.setup input:focus{border-color:#8B1A1A}
.setup-btn{width:100%;padding:11px;background:#8B1A1A;color:#fff;border:none;border-radius:8px;font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer}
.setup-btn:hover{background:#6B1212}
.chat-wrap{display:none;flex-direction:column;width:100%;max-width:460px;height:100vh;max-height:700px;background:#fff;border-radius:12px;border:1px solid #C9A96E;overflow:hidden;box-shadow:0 4px 20px rgba(139,26,26,0.1)}
.chat-header{background:#8B1A1A;padding:14px 16px;text-align:center}
.chat-header-deco{font-size:11px;color:#C9A96E88;letter-spacing:6px;margin-bottom:4px}
.chat-header-title{font-family:'Noto Serif KR',serif;font-size:14px;color:#fff;font-weight:600;line-height:1.5}
.chat-header-sub{font-size:11px;color:#C9A96E;margin-top:3px}
.chat-topic{background:#FDFAF4;border-bottom:1px solid #C9A96E33;padding:8px 16px;text-align:center}
.chat-topic p{font-size:11px;color:#8B1A1A;font-family:'Noto Serif KR',serif}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:#F9F3E8}
.msg{display:flex;flex-direction:column;max-width:78%}
.msg.me{align-self:flex-end;align-items:flex-end}
.msg.other{align-self:flex-start;align-items:flex-start}
.msg-name{font-size:11px;color:#888;margin-bottom:2px;padding:0 4px}
.msg-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:3px}
.msg.me .msg-tag{background:#C9A96E22;color:#8B1A1A}
.msg.other .msg-tag{background:#F5EFE0;color:#8B1A1A}
.msg-bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;word-break:break-all}
.msg.me .msg-bubble{background:#8B1A1A;color:#fff;border-bottom-right-radius:3px}
.msg.other .msg-bubble{background:#fff;color:#333;border:1px solid #C9A96E33;border-bottom-left-radius:3px}
.msg-footer{display:flex;align-items:center;gap:6px;padding:2px 4px}
.msg-time{font-size:10px;color:#aaa}
.msg-del{font-size:10px;color:#ccc;background:none;border:none;cursor:pointer;padding:0}
.msg-del:hover{color:#E24B4A}
.input-area{border-top:1px solid #C9A96E33;background:#fff;padding:10px 12px}
.tag-btns{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.tag-btn{padding:5px 12px;font-size:12px;font-family:'Noto Sans KR',sans-serif;border:1px solid #C9A96E;border-radius:20px;background:#FDFAF4;color:#8B1A1A;cursor:pointer;transition:all 0.15s}
.tag-btn.active{background:#8B1A1A;color:#fff;border-color:#8B1A1A}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;padding:8px 12px;border:1px solid #C9A96E;border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;resize:none;outline:none;background:#FDFAF4;line-height:1.5;max-height:80px;color:#333}
.input-row textarea:focus{border-color:#8B1A1A}
.send-btn{padding:8px 16px;background:#8B1A1A;color:#fff;border:none;border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap}
.send-btn:hover{background:#6B1212}
.room-info{font-size:11px;color:#aaa;text-align:center;padding:4px 0 0}
</style>
</head>
<body>

<div class="setup" id="setup">
  <div class="setup-deco">◆ ◇ ◆</div>
  <div class="setup-title">우희의 답가 '화해하가'는<br>작인가, 타인가?</div>
  <div class="setup-sub">짝과 논쟁 중심 하브루타</div>
  <div class="divider"></div>
  <input type="text" id="nameInput" placeholder="이름을 입력하세요" maxlength="10">
  <input type="text" id="roomInput" placeholder="방 코드 (예: 1모둠)" maxlength="20">
  <button class="setup-btn" id="enterBtn">입장하기</button>
</div>

<div class="chat-wrap" id="chatWrap">
  <div class="chat-header">
    <div class="chat-header-deco">◆ ◇ ◆</div>
    <div class="chat-header-title">우희의 답가 '화해하가'는<br>작인가, 타인가?</div>
    <div class="chat-header-sub" id="headerSub"></div>
  </div>
  <div class="chat-topic">
    <p>나의 입장을 태그와 함께 전달하고, 짝의 주장에 반박해보세요</p>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <div class="tag-btns" id="tagBtns">
      <button class="tag-btn active" data-tag="나의 근거">나의 근거</button>
      <button class="tag-btn" data-tag="반박 질문">반박 질문</button>
      <button class="tag-btn" data-tag="나의 재반박">나의 재반박</button>
    </div>
    <div class="input-row">
      <textarea id="msgInput" placeholder="메시지를 입력하세요..." rows="2"></textarea>
      <button class="send-btn" id="sendBtn">전송</button>
    </div>
    <div class="room-info" id="roomInfo"></div>
  </div>
</div>

<script>
(function() {
  var DB = 'https://havruta-7e467-default-rtdb.europe-west1.firebasedatabase.app';
  var myName = '';
  var myRoom = '';
  var selectedTag = '나의 근거';
  var pollTimer = null;

  function safeRoom(r) {
    return r.replace(/[.#$\[\]/\s]/g, '_');
  }

  function getUrl() {
    return DB + '/rooms/' + safeRoom(myRoom) + '/messages.json';
  }

  function getDelUrl(key) {
    return DB + '/rooms/' + safeRoom(myRoom) + '/messages/' + key + '.json';
  }

  document.getElementById('tagBtns').addEventListener('click', function(e) {
    var btn = e.target.closest('.tag-btn');
    if (!btn) return;
    document.querySelectorAll('.tag-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    selectedTag = btn.dataset.tag;
  });

  document.getElementById('enterBtn').addEventListener('click', function() {
    var name = document.getElementById('nameInput').value.trim();
    var room = document.getElementById('roomInput').value.trim();
    if (!name || !room) { alert('이름과 방 코드를 입력해주세요'); return; }
    myName = name;
    myRoom = room;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('chatWrap').style.display = 'flex';
    document.getElementById('headerSub').textContent = myName + ' · ' + myRoom;
    document.getElementById('roomInfo').textContent = '방: ' + myRoom;
    fetchMsgs();
    pollTimer = setInterval(fetchMsgs, 2500);
  });

  document.getElementById('sendBtn').addEventListener('click', sendMsg);

  document.getElementById('msgInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMsg();
    }
  });

  function sendMsg() {
    var text = document.getElementById('msgInput').value.trim();
    if (!text) return;
    var data = JSON.stringify({ name: myName, text: text, tag: selectedTag, ts: Date.now() });
    fetch(getUrl(), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: data
    }).then(function(res) {
      if (res.ok) {
        document.getElementById('msgInput').value = '';
        fetchMsgs();
      }
    }).catch(function(err) {
      console.error('전송 오류', err);
    });
  }

  function fetchMsgs() {
    fetch(getUrl())
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (!data) { renderMsgs([]); return; }
        var list = [];
        Object.keys(data).forEach(function(k) {
          list.push({ _key: k, name: data[k].name, text: data[k].text, tag: data[k].tag, ts: data[k].ts });
        });
        list.sort(function(a, b) { return a.ts - b.ts; });
        renderMsgs(list);
      }).catch(function(err) {
        console.error('불러오기 오류', err);
      });
  }

  function renderMsgs(list) {
    var box = document.getElementById('messages');
    var atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60;
    box.innerHTML = '';
    list.forEach(function(m) {
      var isMe = m.name === myName;
      var wrap = document.createElement('div');
      wrap.className = 'msg ' + (isMe ? 'me' : 'other');

      if (!isMe) {
        var nameEl = document.createElement('div');
        nameEl.className = 'msg-name';
        nameEl.textContent = m.name;
        wrap.appendChild(nameEl);
      }

      if (m.tag) {
        var tagEl = document.createElement('div');
        tagEl.className = 'msg-tag';
        tagEl.textContent = m.tag;
        wrap.appendChild(tagEl);
      }

      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = m.text;
      wrap.appendChild(bubble);

      var footer = document.createElement('div');
      footer.className = 'msg-footer';

      var time = document.createElement('span');
      time.className = 'msg-time';
      var d = new Date(m.ts);
      time.textContent = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
      footer.appendChild(time);

      if (isMe) {
        var del = document.createElement('button');
        del.className = 'msg-del';
        del.textContent = '✕';
        (function(key) {
          del.addEventListener('click', function() {
            fetch(getDelUrl(key), { method: 'DELETE' }).then(fetchMsgs);
          });
        })(m._key);
        footer.appendChild(del);
      }

      wrap.appendChild(footer);
      box.appendChild(wrap);
    });
    if (atBottom) box.scrollTop = box.scrollHeight;
  }
})();
</script>
</body>
</html>
